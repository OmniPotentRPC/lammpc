name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  stub-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: latest
          cache: true
      - name: Stub + cmocka suites
        run: pixi run test-stub

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: latest
          cache: true
      - name: Stub suite under ASan/UBSan
        run: pixi run test-stub-sanitize

  embed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: latest
          cache: true
      - name: Cache liblammps
        uses: actions/cache@v4
        with:
          path: .lammps-install
          key: liblammps-stable_22Jul2025-serial-v1
      - name: Build liblammps (on cache miss)
        run: pixi run -e embed build-lammps
      - name: Embed suite (real liblammps, LJ analytic E2E)
        run: pixi run -e embed test-embed
