[workspace]
authors = ["Rohit Goswami <rgoswami@ieee.org>"]
channels = ["conda-forge"]
description = "C ABI for embedding LAMMPS with Cap'n Proto parameters."
name = "lammpc"
platforms = ["linux-64", "osx-64", "osx-arm64"]
version = "0.1.0"

[dependencies]
capnproto = ">=1.0.2,<2"
cmocka = ">=1.1.7,<3"
compilers = ">=1.8.0,<2"
meson = ">=1.5.2,<2"
ninja = ">=1.11,<2"
pkgconf = ">=2.5.1,<3"
python = ">=3.10,<4"

[tasks]
test-stub = { cmd = "meson setup build -Dwith_tests=true && meson compile -C build && meson test -C build --print-errorlogs", description = "Configure, build, and test the stub" }
test-stub-sanitize = { cmd = "meson setup build-sanitize -Dwith_tests=true -Db_sanitize=address,undefined -Db_lundef=false && meson compile -C build-sanitize && ASAN_OPTIONS=detect_leaks=0 meson test -C build-sanitize --print-errorlogs", description = "Stub suite under ASan/UBSan" }

[environments]
embed = { features = ["embed"] }

[feature.embed]
platforms = ["linux-64"]

[feature.embed.dependencies]
lammps = "*"
openmpi = "*"

[feature.embed.tasks]
test-embed = { cmd = "meson setup build-embed -Dwith_tests=true -Dwith_lammps=true && meson compile -C build-embed && meson test -C build-embed --print-errorlogs", description = "Embed suite against real liblammps (LJ analytic E2E)" }
